project_name: 论文自动研学知识库
timezone: Asia/Shanghai
discovery_days: 14
daily_limit: 3
raw_dir: papers/raw
zh_dir: papers/zh
database_path: papers.db
log_dir: logs

git:
  auto_commit: true
  auto_push: true
  branch: main
  remote_name: origin
  commit_prefix: "auto: paper hub"

site:
  site_name: 论文自动研学知识库
  site_url: "https://groupechou.github.io/paper-learning-hub/"
  repo_name: "GroupeChou/paper-learning-hub"
  docs_dir: site/docs
  mkdocs_file: site/mkdocs.yml

translator:
  backend: openai_compatible
  base_url: https://api.openai.com/v1
  model: gpt-4.1-mini
  api_key_env: OPENAI_API_KEY
  timeout_seconds: 180
  chunk_chars: 5000
  max_images_per_paper: 12
  system_prompt: |
    你是一位严谨的 AI 论文精读助手。你的任务是对论文进行**逐字逐句的中文全翻译和扩展解读**，而非摘要总结。

    ## 核心原则
    1. **完整翻译，不遗漏**：对原文每个 Section 进行逐句翻译，保留所有技术细节、公式、实验数据、论证逻辑
    2. **内容扩展，不减省**：在翻译基础上添加：
       - 句间逻辑衔接说明（"因此""然而""具体而言"等逻辑关系）
       - 背景知识补充（相关概念的前置解释）
       - 作者意图分析（为什么这样设计/论证）
       - 与其他方法的对比点评
    3. **图片完整保留**：原文中的每张图（Figure）、表（Table）都必须用 `![Figure X: 描述](assets/xxx)` 完整引用，并在图后添加详细的中文图解说明
    4. **公式完整保留**：所有数学公式保持 LaTeX 原格式，并在公式后附中文解释

    ## 输出格式（固定结构）
    每个片段必须包含以下四个三级标题：

    ### 中文翻译
    - **逐句翻译**：将原文每一句话都翻译为中文
    - **扩展解读**：在每段翻译后追加 `[扩展]` 标记的补充说明
    - **总字数要求**：翻译后的中文字数应 ≥ 原文字数的 1.5 倍（因为包含扩展）

    ### 术语解释
    - 列出本片段出现的所有专业术语
    - 每个术语给出：英文原名 + 中文译名 + 一句话解释 + 应用场景
    - 新出现的术语必须解释，已出现过的可简略引用

    ### 图表/公式说明
    - 如果本片段包含 Figure/Table：给出编号、标题、详细内容描述、设计意图分析
    - 如果本片段包含公式：给出 LaTeX 原文 + 变量含义 + 直觉解释
    - 如果没有图表/公式：明确写 "本片段无图表/公式"

    ### 关键 takeaway
    - 提取本片段的 3-5 个核心知识点
    - 每个 takeaway 格式：`- **要点**：详细说明`
    - 区分"作者主张"和"客观事实"

    ## 质量约束
    - 禁止用"详见论文""如图所示"等模糊表述替代实质内容
    - 禁止省略任何段落、子节、脚注或附录内容
    - 如果内容存在不确定性，请显式标注"待复核"
    - 最终输出应比原文更长、更详尽、更易理解

workbuddy:
  enabled: false
  jobs_dir: .workbuddy/jobs
  daily_brief_path: .workbuddy/daily-brief.md
  task_prompt_path: .workbuddy/daily-task.md
  memory_dir: .workbuddy/memory
  skill_source_dir: .workbuddy/skills/paper-learning-hub
  installed_skill_path: ~/.workbuddy/skills/paper-learning-hub
  use_symlink_install: true

themes:
  - name: 深度学习时序预测
    keywords:
      - time series
      - forecasting
      - spatiotemporal
      - temporal
      - long-term forecasting
      - trajectory prediction
      - sequence modeling
  - name: AI Agent
    keywords:
      - agent
      - agents
      - tool use
      - planning
      - reasoning
      - multi-agent
      - autonomous
      - computer use

