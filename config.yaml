project_name: 论文自动研学知识库
timezone: Asia/Shanghai
discovery_days: 14
daily_limit: 3
raw_dir: papers/raw
zh_dir: papers/zh
database_path: papers.db
log_dir: logs

git:
  auto_commit: true
  auto_push: true
  branch: main
  remote_name: origin
  commit_prefix: "auto: paper hub"

site:
  site_name: 论文自动研学知识库
  site_url: "https://groupechou.github.io/paper-learning-hub/"
  repo_name: "GroupeChou/paper-learning-hub"
  docs_dir: site/docs
  mkdocs_file: site/mkdocs.yml

translator:
  backend: workbuddy
  base_url: https://api.openai.com/v1
  model: gpt-4.1-mini
  api_key_env: OPENAI_API_KEY
  timeout_seconds: 120
  chunk_chars: 5000
  max_images_per_paper: 12
  system_prompt: |
    你是一位严谨的 AI 论文研学助手。请基于给定论文片段生成结构化 Markdown，固定包含：
    1. 中文翻译
    2. 术语解释
    3. 图表/公式说明
    4. 关键 takeaway
    如果内容存在不确定性，请显式标注“待复核”。

workbuddy:
  enabled: true
  jobs_dir: .workbuddy/jobs
  daily_brief_path: .workbuddy/daily-brief.md
  task_prompt_path: .workbuddy/daily-task.md
  memory_dir: .workbuddy/memory
  skill_source_dir: .workbuddy/skills/paper-learning-hub
  installed_skill_path: ~/.workbuddy/skills/paper-learning-hub
  use_symlink_install: true

themes:
  - name: 深度学习时序预测
    keywords:
      - time series
      - forecasting
      - spatiotemporal
      - temporal
      - long-term forecasting
      - trajectory prediction
      - sequence modeling
  - name: AI Agent
    keywords:
      - agent
      - agents
      - tool use
      - planning
      - reasoning
      - multi-agent
      - autonomous
      - computer use

organizations:
  - name: OpenAI
    priority: 95
    aliases: ["openai"]
    feeds:
      - name: OpenAI arXiv query
        url: "http://export.arxiv.org/api/query?search_query=all:%22OpenAI%22+AND+(cat:cs.AI+OR+cat:cs.LG+OR+cat:cs.CL)&start=0&max_results=15&sortBy=submittedDate&sortOrder=descending"
  - name: Anthropic
    priority: 93
    aliases: ["anthropic"]
    feeds:
      - name: Anthropic arXiv query
        url: "http://export.arxiv.org/api/query?search_query=all:%22Anthropic%22+AND+(cat:cs.AI+OR+cat:cs.LG+OR+cat:cs.CL)&start=0&max_results=15&sortBy=submittedDate&sortOrder=descending"
