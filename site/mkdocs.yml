site_name: 论文研学知识库
site_url: https://groupechou.github.io/paper-learning-hub/
repo_name: GroupeChou/paper-learning-hub

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: 切换深色模式
    - media: "(prefers-color-scheme: dark)"
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: 切换浅色模式
  features:
    # 导航结构
    - navigation.sections          # 顶级分区折叠
    - navigation.expand             # 左侧栏默认展开
    - navigation.indexes            # 目录页自动作为索引
    - navigation.top                # 回到顶部
    - navigation.tracking           # URL 跟随导航高亮
    # 内容增强
    - content.code.copy            # 代码一键复制
    - content.code.annotate         # 代码行号注释
    - content.tabs.link            # Tab 状态同步
    - content.tooltips             # 术语悬停提示
    # 搜索增强
    - search.highlight             # 搜索结果高亮
    - search.share                 # 搜索结果可分享
    - search.suggest              # 输入时推荐
  font:
    text: "Noto Sans SC"
    code: "JetBrains Mono"
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - zh
        - en
  - tags:                          # 论文标签系统
      enabled: true

markdown_extensions:
  # 基础格式
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 4
  # 代码高亮
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __dd
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  # 数学公式
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.mark

extra:
  generator: false                 # 隐藏 "Created with Material for MkDocs"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/GroupeChou/paper-learning-hub
  alternate:
    - name: 中文
      link: /
      lang: zh

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/mathjax.js
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js

extra_css:
  - stylesheets/extra.css
  - stylesheets/paper.css

# ============================================================
# 书籍结构导航（Table of Contents）
# ============================================================
