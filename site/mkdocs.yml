site_name: 论文自动研学知识库
site_url: 
repo_name: 
theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - content.code.copy
plugins:
  - search
markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
extra_css:
  - stylesheets/extra.css
nav:
  - 首页: index.md
  - 今日新增: guides/daily-guide.md
  - 经典必读: guides/classics.md
  - 专题索引: topics/index.md
  - 论文详情页: papers/index.md
