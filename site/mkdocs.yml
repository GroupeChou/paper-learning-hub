  - 🧠 AI Agent 智能体:
    - 路线简介: tracks/agent/index.md
    - 入门: tracks/agent/getting-started.md
    - 论文精读:
      - papers/2604.17111v1/index.md
      - papers/2604.21255v1/index.md
      - papers/2604.12102v2/index.md
    - 待读论文: tracks/agent/queue.md

  - 📈 时序预测:
    - 路线简介: tracks/forecasting/index.md
    - 入门: tracks/forecasting/getting-started.md
    - 论文精读: tracks/forecasting/reading-list.md
    - 待读论文: tracks/forecasting/queue.md

  - 📚 经典必读:
